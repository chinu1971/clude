name: Leofame Daily Automation

on:
  schedule:
    - cron: "30 3 * * *"   # 2:30 AM UTC = 8:00 AM IST
  workflow_dispatch:         # also allows manual run from GitHub

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation
        env:
          INSTAGRAM_LINK: ${{ secrets.INSTAGRAM_LINK }}
        run: python main.py
